<!DOCTYPE html>
<html style="height:100%;margin:0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{display:flex;justify-content:center;align-items:center;height:100%;margin:0;background:#fff;font-family:-apple-system,sans-serif}
        .loading{text-align:center;color:#666;font-size:15px}
        .loading .spinner{width:36px;height:36px;border:3px solid #e5e5e5;border-top-color:#3182f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error{text-align:center;padding:40px;color:#e53935;font-size:14px}
    </style>
</head>
<body>
<div id="status" class="loading">
    <div class="spinner"></div>
    결제 페이지로 이동 중...
</div>
<script src="https://js.tosspayments.com/v1"></script>
<script>
var params=new URLSearchParams(location.search);
var amount=parseInt(params.get('amount'))||0;
var orderId=params.get('orderId')||'WH-'+Date.now();
var orderName=decodeURIComponent(params.get('orderName')||'월향 주문');
var method=decodeURIComponent(params.get('method')||'카드');
var customerName=decodeURIComponent(params.get('customerName')||'');
var clientKey='test_ck_D5GePWvyJnrK0W0k6q8gmeYX7owd';

try{
    var tossPayments=TossPayments(clientKey);
    tossPayments.requestPayment(method,{
        amount:amount,
        orderId:orderId,
        orderName:orderName,
        customerName:customerName||undefined,
        successUrl:'https://jk030430-coder.github.io/wolhyang-postcode/payment-success',
        failUrl:'https://jk030430-coder.github.io/wolhyang-postcode/payment-fail'
    }).catch(function(err){
        if(err.code==='USER_CANCEL'){
            if(window.Android) Android.onPaymentFail('USER_CANCEL','사용자 취소');
            return;
        }
        document.getElementById('status').innerHTML='<div class="error">'+( err.message||'결제 실패')+'</div>';
        if(window.Android) Android.onPaymentFail(err.code||'UNKNOWN',err.message||'결제 실패');
    });
}catch(e){
    document.getElementById('status').innerHTML='<div class="error">결제 모듈 오류: '+e.message+'</div>';
    if(window.Android) Android.onPaymentFail('INIT_ERROR',e.message);
}
</script>
</body>
</html>

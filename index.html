<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#fff}
        #layer{width:100%;height:100%}
    </style>
</head>
<body>
<div id="layer"></div>
<script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
try {
    var P = (typeof kakao !== 'undefined' && kakao.Postcode) ? kakao.Postcode
          : (typeof daum !== 'undefined' && daum.Postcode) ? daum.Postcode : null;
    if (P) {
        var h = window.innerHeight || document.documentElement.clientHeight || 500;
        var w = window.innerWidth || document.documentElement.clientWidth || 360;
        var layer = document.getElementById('layer');
        layer.style.width = w + 'px';
        layer.style.height = h + 'px';
        new P({
            oncomplete: function(data) {
                var addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                if (window.Android) { Android.onAddressSelected(data.zonecode, addr); }
            },
            onclose: function() {
                if (window.Android) { Android.onClosed(); }
            },
            width: w,
            height: h
        }).embed(layer);
        setTimeout(function() {
            var iframe = layer.querySelector('iframe');
            if (iframe) {
                iframe.style.width = w + 'px';
                iframe.style.height = h + 'px';
            }
        }, 300);
        if (window.Android) { Android.onReady(); }
    } else {
        if (window.Android) { Android.onError('Postcode class not found'); }
    }
} catch(e) {
    if (window.Android) { Android.onError(e.message); }
}
</script>
</body>
</html>
